<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.09);
      padding: 52px 44px 44px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .icon {
      width: 52px;
      height: 52px;
      background: #ede9fe;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 22px;
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #111;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 32px;
    }
    input[type="password"] {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid #e5e7eb;
      border-radius: 9px;
      font-size: 15px;
      color: #111;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 14px;
      letter-spacing: 0.05em;
    }
    input[type="password"]:focus { border-color: #6d28d9; box-shadow: 0 0 0 3px rgba(109,40,217,0.1); }
    button {
      width: 100%;
      padding: 13px;
      background: #5b21b6;
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #4c1d95; }
    .error {
      color: #dc2626;
      font-size: 13px;
      margin-top: 12px;
      background: #fef2f2;
      padding: 8px 12px;
      border-radius: 7px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔒</div>
    <h1>{{ title }}</h1>
    <p class="subtitle">Enter the password to continue</p>
    <form method="post">
      <input type="password" name="password" placeholder="Password" autofocus autocomplete="current-password" />
      <button type="submit">Enter</button>
      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}
    </form>
  </div>
</body>
</html>
